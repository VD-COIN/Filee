<!DOCTYPE html><html>
<head>
  <title>File Approval System</title>
</head>
<body><h2 id="title"></h2>
<div id="app"></div><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script><script>
// 🔥 YOUR FIREBASE CONFIG (INSERTED)
const firebaseConfig = {
  apiKey: "AIzaSyBQSg8Sni9L9ugCs-kQan60i90vyOFuZiY",
  authDomain: "file-approvla.firebaseapp.com",
  projectId: "file-approvla",
  storageBucket: "file-approvla.appspot.com",
  messagingSenderId: "921925362811",
  appId: "1:921925362811:web:8c850aacd7f226cb0ceede",
  measurementId: "G-P8CKH05HX3"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

// 📌 Detect mode
const params = new URLSearchParams(window.location.search);
const mode = params.get("mode");

// ================= CLIENT =================
if (mode === "client") {
  document.getElementById("title").innerText = "Submit Files";

  document.getElementById("app").innerHTML = `
    <input id="name" placeholder="Name"><br><br>
    <input id="email" placeholder="Email"><br><br>
    <input type="file" id="files" multiple><br><br>
    <button onclick="upload()">Submit</button>
    <p id="progress"></p>
  `;
}

// ================= ADMIN =================
if (mode === "admin") {
  document.getElementById("title").innerText = "Admin Panel";

  document.getElementById("app").innerHTML = `<div id="list"></div>`;

  db.collection("submissions").onSnapshot(snapshot => {
    let html = "";

    snapshot.forEach(doc => {
      let data = doc.data();

      let files = "";
      data.files.forEach(f => {
        files += `<a href="${f}" target="_blank">View File</a><br>`;
      });

      html += `
        <div style="border:1px solid black; margin:10px; padding:10px;">
          <p><b>ID:</b> ${doc.id}</p>
          <p><b>Name:</b> ${data.name}</p>
          <p><b>Status:</b> ${data.status}</p>
          ${files}
          <button onclick="update('${doc.id}','accepted')">✅ Accept</button>
          <button onclick="update('${doc.id}','rejected')">❌ Reject</button>
        </div>
      `;
    });

    document.getElementById("list").innerHTML = html;
  });
}

// ================= STATUS =================
if (mode === "status") {
  document.getElementById("title").innerText = "Check Status";

  document.getElementById("app").innerHTML = `
    <input id="id" placeholder="Enter ID"><br><br>
    <button onclick="check()">Check</button>
    <p id="result"></p>
  `;
}

// ================= FUNCTIONS =================
async function upload() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const files = document.getElementById("files").files;

  let urls = [];

  for (let file of files) {

    if (file.size > 50 * 1024 * 1024) {
      alert("File too large! Max 50MB");
      return;
    }

    const ref = storage.ref("uploads/" + Date.now() + file.name);
    const task = ref.put(file);

    await new Promise((resolve, reject) => {
      task.on("state_changed",
        (snap) => {
          let percent = (snap.bytesTransferred / snap.totalBytes) * 100;
          document.getElementById("progress").innerText =
            "Uploading: " + percent.toFixed(0) + "%";
        },
        reject,
        async () => {
          const url = await ref.getDownloadURL();
          urls.push(url);
          resolve();
        }
      );
    });
  }

  const doc = await db.collection("submissions").add({
    name,
    email,
    files: urls,
    status: "pending",
    createdAt: new Date()
  });

  alert("Submitted! Your ID: " + doc.id);
}

function update(id, status) {
  db.collection("submissions").doc(id).update({ status });
}

function check() {
  let id = document.getElementById("id").value;

  db.collection("submissions").doc(id)
    .onSnapshot(doc => {
      if (doc.exists) {
        let status = doc.data().status;

        if (status === "pending") {
          result.innerText = "⏳ Pending";
        } else if (status === "accepted") {
          result.innerText = "✅ Accepted";
        } else {
          result.innerText = "❌ Rejected";
        }
      } else {
        result.innerText = "Not found";
      }
    });
}
</script></body>
</html>
