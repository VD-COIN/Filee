<!DOCTYPE html><html>
<head>
  <title>Client Upload</title>
</head>
<body><h2>Submit Files</h2><input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input type="file" id="files" multiple><br><br>

<button onclick="upload()">Submit</button>

<p id="progress"></p><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script><script>
const firebaseConfig = {
  apiKey: "AIzaSyBQSg8Sni9L9ugCs-kQan60i90vyOFuZiY",
  authDomain: "file-approvla.firebaseapp.com",
  projectId: "file-approvla",
  storageBucket: "file-approvla.firebasestorage.app",
  messagingSenderId: "921925362811",
  appId: "1:921925362811:web:8c850aacd7f226cb0ceede",
  measurementId: "G-P8CKH05HX3"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

async function upload() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const files = document.getElementById("files").files;

  let urls = [];

  for (let file of files) {

    if (file.size > 50 * 1024 * 1024) {
      alert("File too large! Max 50MB");
      return;
    }

    const ref = storage.ref("uploads/" + Date.now() + file.name);
    const task = ref.put(file);

    await new Promise((resolve, reject) => {
      task.on("state_changed",
        (snap) => {
          let percent = (snap.bytesTransferred / snap.totalBytes) * 100;
          document.getElementById("progress").innerText =
            "Uploading: " + percent.toFixed(0) + "%";
        },
        reject,
        async () => {
          const url = await ref.getDownloadURL();
          urls.push(url);
          resolve();
        }
      );
    });
  }

  const doc = await db.collection("submissions").add({
    name,
    email,
    files: urls,
    status: "pending",
    createdAt: new Date()
  });

  alert("Submitted! Your ID: " + doc.id);
}
</script></body>
</html>
