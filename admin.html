<!DOCTYPE html><html>
<head>
  <title>Admin Panel</title>
</head>
<body><h2>Admin Panel</h2>
<div id="list"></div><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script><script>
const firebaseConfig = {
  apiKey: "AIzaSyBQSg8Sni9L9ugCs-kQan60i90vyOFuZiY",
  authDomain: "file-approvla.firebaseapp.com",
  projectId: "file-approvla",
  storageBucket: "file-approvla.firebasestorage.app",
  messagingSenderId: "921925362811",
  appId: "1:921925362811:web:8c850aacd7f226cb0ceede",
  measurementId: "G-P8CKH05HX3"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

db.collection("submissions").onSnapshot(snapshot => {
  let html = "";

  snapshot.forEach(doc => {
    let data = doc.data();

    let files = "";
    data.files.forEach(f => {
      files += `<a href="${f}" target="_blank">View File</a><br>`;
    });

    html += `
      <div style="border:1px solid black; margin:10px; padding:10px;">
        <p><b>ID:</b> ${doc.id}</p>
        <p><b>Name:</b> ${data.name}</p>
        <p><b>Email:</b> ${data.email}</p>
        <p><b>Status:</b> ${data.status}</p>
        ${files}
        <button onclick="update('${doc.id}','accepted')">Accept</button>
        <button onclick="update('${doc.id}','rejected')">Reject</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
});

function update(id, status) {
  db.collection("submissions").doc(id).update({
    status: status
  });
}
</script></body>
</html>
