<!DOCTYPE html><html>
<head>
  <title>Check Status</title>
</head>
<body><h2>Check Status</h2><input id="id" placeholder="Enter your ID"><br><br>
<button onclick="check()">Check</button>

<p id="result"></p><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script><script>
const firebaseConfig = {
  apiKey: "AIzaSyBQSg8Sni9L9ugCs-kQan60i90vyOFuZiY",
  authDomain: "file-approvla.firebaseapp.com",
  projectId: "file-approvla",
  storageBucket: "file-approvla.firebasestorage.app",
  messagingSenderId: "921925362811",
  appId: "1:921925362811:web:8c850aacd7f226cb0ceede",
  measurementId: "G-P8CKH05HX3"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function check() {
  let id = document.getElementById("id").value;

  db.collection("submissions").doc(id)
    .onSnapshot(doc => {
      if (doc.exists) {
        let status = doc.data().status;

        if (status === "pending") {
          result.innerText = "⏳ Pending";
        } else if (status === "accepted") {
          result.innerText = "✅ Accepted";
        } else {
          result.innerText = "❌ Rejected";
        }
      } else {
        result.innerText = "Not found";
      }
    });
}
</script></body>
</html>
